# /etc/mosquitto/conf.d/soundcheck.conf
# Place this file on Pi B alongside the default mosquitto.conf.
# Restart with: sudo systemctl restart mosquitto

# Listen on all interfaces (required since Mosquitto 2.x)
listener 1883
allow_anonymous true

# Allow large payloads for 60s audio (base64 ~2.5 MB)
message_size_limit 10485760

# Increase queue for reliable QoS-1 delivery over WiFi
max_queued_messages 100
