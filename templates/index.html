<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="On-demand bedroom sound leakage monitor">
  <title>SoundCheck</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SoundCheck">
  <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
  <meta name="theme-color" content="#0f0f1a">

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom styles -->
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────── -->
<header class="app-header px-3 pt-safe">
  <div class="d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-soundwave fs-4 text-primary"></i>
      <span class="fw-semibold fs-5">SoundCheck</span>
    </div>
    <div id="conn-badge" class="badge bg-secondary">
      <i class="bi bi-wifi-off me-1"></i>Connecting
    </div>
  </div>
</header>

<main class="container-fluid px-3 pb-safe" style="max-width: 480px; margin: 0 auto;">

  <!-- ── Mode buttons ───────────────────────────────────────────── -->
  <section class="mt-3" id="mode-section">
    <p class="text-muted small text-center mb-2">Select check duration</p>
    <div class="d-grid gap-2">
      <button class="btn btn-mode btn-short" id="btn-short"
              onclick="startCheck('short')">
        <span class="mode-label">SHORT</span>
        <span class="mode-sub">10 seconds · quick sanity check</span>
        <span class="mode-quality">~600 FFT segments</span>
      </button>
      <button class="btn btn-mode btn-medium" id="btn-medium"
              onclick="startCheck('medium')">
        <span class="mode-label">MEDIUM</span>
        <span class="mode-sub">30 seconds · recommended default</span>
        <span class="mode-quality">~1,900 FFT segments · high confidence</span>
      </button>
      <button class="btn btn-mode btn-long" id="btn-long"
              onclick="startCheck('long')">
        <span class="mode-label">LONG</span>
        <span class="mode-sub">60 seconds · definitive answer</span>
        <span class="mode-quality">~3,700 FFT segments · excellent confidence</span>
      </button>
    </div>
  </section>

  <!-- ── Status / Progress ──────────────────────────────────────── -->
  <section id="status-section" class="mt-3 d-none">
    <div class="card card-dark">
      <div class="card-body py-3">
        <div class="d-flex align-items-center gap-2 mb-2">
          <div class="spinner-border spinner-border-sm text-primary" id="status-spinner"></div>
          <span id="status-text" class="fw-semibold">Initialising…</span>
        </div>
        <div class="progress mb-1" style="height: 8px;" id="progress-wrap">
          <div id="progress-bar"
               class="progress-bar progress-bar-striped progress-bar-animated"
               style="width: 0%"></div>
        </div>
        <div class="d-flex justify-content-between">
          <small class="text-muted" id="progress-label">0%</small>
          <small class="text-muted" id="time-remaining"></small>
        </div>
        <button class="btn btn-sm btn-outline-secondary mt-2 w-100 d-none"
                id="btn-cancel" onclick="cancelCheck()">
          Cancel
        </button>
      </div>
    </div>
  </section>

  <!-- ── Result ─────────────────────────────────────────────────── -->
  <section id="result-section" class="mt-3 d-none">
    <div class="card card-dark result-card" id="result-card">
      <div class="card-body py-3">

        <!-- Gauge -->
        <div class="gauge-wrap mb-2">
          <canvas id="gauge-canvas" width="280" height="150"></canvas>
          <div class="gauge-readout">
            <div id="gauge-db" class="gauge-db-value">—</div>
            <div id="gauge-unit" class="gauge-db-unit">dB leakage</div>
          </div>
        </div>

        <!-- Verdict badge -->
        <div class="text-center mb-3">
          <span id="verdict-badge" class="verdict-badge">—</span>
          <div id="confidence-text" class="text-muted small mt-1"></div>
        </div>

        <!-- Band breakdown -->
        <div class="band-grid mb-3">
          <div class="band-item">
            <div class="band-label">BASS</div>
            <div class="band-bar-wrap">
              <div class="band-bar" id="bar-bass"></div>
            </div>
            <div class="band-value" id="val-bass">—</div>
          </div>
          <div class="band-item">
            <div class="band-label">MID</div>
            <div class="band-bar-wrap">
              <div class="band-bar" id="bar-mid"></div>
            </div>
            <div class="band-value" id="val-mid">—</div>
          </div>
          <div class="band-item">
            <div class="band-label">TREBLE</div>
            <div class="band-bar-wrap">
              <div class="band-bar" id="bar-treble"></div>
            </div>
            <div class="band-value" id="val-treble">—</div>
          </div>
        </div>

        <!-- Meta info -->
        <div class="result-meta d-flex justify-content-between">
          <small class="text-muted" id="result-mode"></small>
          <small class="text-muted" id="result-segments"></small>
        </div>

      </div>
    </div>
  </section>

  <!-- ── Error ──────────────────────────────────────────────────── -->
  <div id="error-alert" class="alert alert-danger mt-3 d-none" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    <span id="error-text"></span>
  </div>

  <!-- ── History ────────────────────────────────────────────────── -->
  <section class="mt-4 mb-3">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <h6 class="mb-0 text-muted text-uppercase small fw-semibold">
        Recent checks
      </h6>
      <button class="btn btn-sm btn-link text-muted p-0"
              onclick="loadHistory()">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
    <div id="history-list">
      <p class="text-muted small text-center py-2">No checks yet</p>
    </div>
  </section>

</main>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="/static/js/dashboard.js"></script>

</body>
</html>
